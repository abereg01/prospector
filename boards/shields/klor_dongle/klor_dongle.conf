# USB HID output to host computer
CONFIG_ZMK_USB=y

# Enable ZMK pointing (mouse/scroll) — required for &msc horizontal scroll
# (used by scrl_h on the SCROLL layer encoder binding). The dongle is the
# central, so the keymap executes here and needs the pointing subsystem.
CONFIG_ZMK_POINTING=y

# No ambient light sensor — disable ALS so the fixed brightness path is used
# instead of the ALS thread (which would never set brightness without a sensor)
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80

# Status screen layout — Operator (technical, information-dense). Replaces the
# old Shuko KLOR screen. Other choices: CLASSIC (default upstream), RADII, FIELD.
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

# Modifier row style — Mac symbols (⌘ ⌥ ⌃ ⇧). Default is Mac so this is
# explicit-but-redundant; left here as documentation. Alternatives:
# PROSPECTOR_MODIFIER_OS_WINDOWS or PROSPECTOR_MODIFIER_OS_GENERIC.
CONFIG_PROSPECTOR_MODIFIER_OS_MAC=y

# Layer names rendered in uppercase. Default is y; explicit for clarity.
CONFIG_PROSPECTOR_LAYER_NAME_UPPERCASE=y

# No EC11 — encoders live on the peripheral halves, not the dongle
# No ZMK_DISPLAY — handled by prospector_adapter shield
# No ZMK_RGB_UNDERGLOW — no LEDs on the dongle
